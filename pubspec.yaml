name: acacia_ceramics
description: تطبيق آكاسيا للسيراميك - تطوير محمد جزماتي
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.0
  firebase_analytics: ^10.7.0
  provider: ^6.1.1
  carousel_slider: ^4.2.1
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  share_plus: ^7.2.1
  url_launcher: ^6.2.1
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  flutter_local_notifications: ^16.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
